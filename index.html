<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光学衍射仿真 — 3D 交互式</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
       background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh; }
#app { display: flex; height: 100vh; }

/* 左侧面板 */
#left-panel { width: 280px; min-width: 280px; background: #16213e; 
              padding: 15px; overflow-y: auto; border-right: 2px solid #0f3460; 
              display: flex; flex-direction: column; gap: 8px; }
#left-panel h2 { text-align: center; color: #e94560; font-size: 1.1em; 
                 margin-bottom: 5px; }
#left-panel h3 { color: #7ec8e3; font-size: 0.85em; margin: 5px 0 3px; }
.control-group { margin-bottom: 4px; }
.control-group label { display: block; font-size: 0.78em; color: #a0a0a0; 
                       margin-bottom: 2px; }
.control-group select, .control-group input[type=range] { 
    width: 100%; padding: 5px; border-radius: 4px; background: #1a1a2e; 
    color: #e0e0e0; border: 1px solid #0f3460; font-size: 0.82em; }
.control-group input[type=range] { padding: 0; accent-color: #e94560; }
.range-info { display: flex; justify-content: space-between; font-size: 0.7em; color: #666; }
.param-value { font-size: 0.75em; color: #e94560; text-align: right; }

/* 模式指示 */
.mode-indicator { background: #0f3460; border-radius: 8px; padding: 10px; 
                  text-align: center; }
.mode-indicator .mode-name { font-size: 1em; font-weight: bold; }
.mode-indicator .nf-value { font-size: 1.1em; color: #e94560; margin: 3px 0; }
.mode-indicator .suggestion { font-size: 0.75em; color: #f0ad4e; }

/* 按钮 */
.btn-row { display: flex; gap: 8px; }
.btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; 
       font-size: 0.8em; font-weight: bold; transition: all 0.2s; }
.btn-primary { background: #e94560; color: white; }
.btn-primary:hover { background: #c73b54; }
.btn-secondary { background: #0f3460; color: #7ec8e3; }
.btn-secondary:hover { background: #1a4a7a; }
.btn-kb { background: #f0ad4e; color: #1a1a2e; margin-top: 5px; }
.btn-kb:hover { background: #d4943c; }

/* 右侧主区域 */
#main-area { flex: 1; display: flex; flex-direction: column; }

/* 3D 视图 */
#view3d-container { flex: 1; min-height: 0; position: relative; }
#view3d-container canvas { display: block; }
#view3d-label { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
                color: #7ec8e3; font-size: 0.9em; font-weight: bold; 
                background: rgba(22, 33, 62, 0.9); padding: 4px 16px; 
                border-radius: 12px; pointer-events: none; }

/* 底部面板 */
#bottom-panel { display: flex; height: 380px; border-top: 2px solid #0f3460; }
#intensity-panel { flex: 1; padding: 10px; background: #16213e; }
#pattern-panel { flex: 1; padding: 10px; background: #16213e; 
                 border-left: 2px solid #0f3460; display: flex; flex-direction: column; }
#pattern-panel h3 { color: #7ec8e3; font-size: 0.8em; text-align: center; margin: 0 0 5px 0; }
#intensity-panel h3 { color: #7ec8e3; font-size: 0.8em; text-align: center; margin: 0 0 5px 0; }
#intensity-chart, #pattern-img-container { flex: 1; }
#pattern-img-container { display: flex; align-items: center; justify-content: center; background: black; border-radius: 4px; overflow: hidden; }
#pattern-img-container img { width: 100%; height: 100%; object-fit: contain; }

/* 知识弹窗 */
#knowledge-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                   background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
#knowledge-modal.show { display: flex; }
#knowledge-content { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; 
                     padding: 25px; max-width: 600px; max-height: 80vh; overflow-y: auto; 
                     color: #e0e0e0; }
#knowledge-content h2 { color: #7ec8e3; margin-bottom: 12px; }
#knowledge-content h3 { color: #e94560; margin: 12px 0 6px; }
#knowledge-content p, #knowledge-content li { font-size: 0.85em; line-height: 1.6; margin: 4px 0; }
#knowledge-content .formula { background: #0f3460; padding: 8px 12px; border-radius: 4px; 
                               font-family: monospace; font-size: 0.85em; margin: 6px 0; }
#close-kb { float: right; background: none; border: none; color: #e94560; font-size: 1.2em; cursor: pointer; }

/* 加载指示 */
#loading { display: none; position: fixed; top: 10px; right: 10px; background: rgba(22,33,62,0.9); 
           color: #e94560; padding: 8px 16px; border-radius: 8px; font-size: 0.8em; z-index: 999; }
</style>
</head>
<body>
<div id="app">
  <!-- 左侧参数面板 -->
  <div id="left-panel">
    <h2>🔬 光学衍射仿真</h2>
    
    <div class="control-group">
      <label>衍射模式</label>
      <select id="diff-mode">
        <option value="fresnel">菲涅耳衍射 (近场)</option>
        <option value="fraunhofer" selected>夫琅禾费衍射 (远场)</option>
      </select>
    </div>
    
    <div class="control-group">
      <label>衍射类型</label>
      <select id="diff-type">
        <option value="single_slit">单缝衍射</option>
        <option value="circular">圆孔衍射</option>
        <option value="circular_disk">圆屏衍射</option>
        <option value="rectangular">矩孔衍射</option>
      </select>
    </div>
    
    <div class="control-group" id="wl-group">
      <label>波长 λ (nm)</label>
      <input type="range" id="wavelength" min="380" max="780" value="632.8" step="0.1">
      <div class="range-info"><span>380 (紫)</span><span class="param-value" id="wl-val">632.8</span><span>780 (红)</span></div>
    </div>
    
    <div class="control-group" id="ap-group">
      <label id="ap-label">缝宽/孔径 a (mm)</label>
      <input type="range" id="aperture" min="0.01" max="2.0" value="0.15" step="0.01">
      <div class="range-info"><span>0.01</span><span class="param-value" id="ap-val">0.15</span><span>2.0</span></div>
    </div>
    
    <div class="control-group" id="aph-group" style="display:none">
      <label>孔高 b (mm)</label>
      <input type="range" id="aperture-h" min="0.01" max="2.0" value="0.5" step="0.01">
      <div class="range-info"><span>0.01</span><span class="param-value" id="aph-val">0.50</span><span>2.0</span></div>
    </div>
    
    <div class="control-group" id="dr-group" style="display:none">
      <label>圆屏半径 R (mm)</label>
      <input type="range" id="disk-radius" min="0.05" max="2.0" value="0.5" step="0.01">
      <div class="range-info"><span>0.05</span><span class="param-value" id="dr-val">0.50</span><span>2.0</span></div>
    </div>
    
    <div class="control-group" id="sd-group" style="display:none">
      <label>光源距离 u (cm)</label>
      <input type="range" id="source-distance" min="1" max="500" value="30" step="0.1">
      <div class="range-info"><span>1</span><span class="param-value" id="sd-val">30.0</span><span>500</span></div>
    </div>
    
    <div class="control-group">
      <label>观察距离 L (cm)</label>
      <input type="range" id="obs-distance" min="1" max="500" value="50" step="0.1">
      <div class="range-info"><span>1</span><span class="param-value" id="od-val">50.0</span><span>500</span></div>
    </div>
    
    <div class="mode-indicator" id="mode-indicator">
      <div class="mode-name" id="mode-name">夫琅禾费衍射</div>
      <div class="nf-value" id="nf-value">Nf = 0.0004</div>
      <div class="suggestion" id="suggestion"></div>
    </div>
    
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-reset">↺ 重置</button>
      <button class="btn btn-secondary" id="btn-pause">⏯ 暂停</button>
    </div>
    <button class="btn btn-kb" id="btn-knowledge">📖 衍射知识库</button>
  </div>
  
  <!-- 主区域 -->
  <div id="main-area">
    <div id="view3d-container">
      <div id="view3d-label">拖动鼠标旋转 | 滚轮缩放 | 右键平移</div>
    </div>
    <div id="bottom-panel">
      <div id="intensity-panel">
        <h3>光强分布</h3>
        <canvas id="intensity-chart"></canvas>
      </div>
      <div id="pattern-panel">
        <h3>衍射图样</h3>
        <div id="pattern-img-container">
          <img id="pattern-img" src="" alt="衍射图样">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 知识弹窗 -->
<div id="knowledge-modal">
  <div id="knowledge-content">
    <button id="close-kb">✕</button>
    <div id="kb-body"></div>
  </div>
</div>

<div id="loading">计算中...</div>

<!-- Three.js -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// 全局变量
// ============================================================
let scene, camera, renderer, controls;
let deviceGroup = new THREE.Group();
let animationId;

// 装置组件引用
let lightSource, obstacleGroup, lensL1Group, lensL2Group, screenPlane;
let rayLines = [];

// 参数
let params = {
  diffType: 'single_slit',
  diffMode: 'fraunhofer',
  wavelength: 632.8,
  aperture: 0.15,
  apertureHeight: 0.5,
  diskRadius: 0.5,
  obsDistance: 50,
  sourceDistance: 30  // Fresnel only
};

// ============================================================
// 初始化 3D 场景
// ============================================================
function initScene() {
  const container = document.getElementById('view3d-container');
  
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.Fog(0x0a0a1a, 15, 50);
  
  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.5, 100);
  camera.position.set(8, 5, 16);
  camera.lookAt(2, 0, 0);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);
  
  // 控制器
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(2, 0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 5;
  controls.maxDistance = 40;
  controls.maxPolarAngle = Math.PI * 0.7;
  controls.update();
  
  // 光照
  const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
  dirLight.position.set(10, 15, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -20;
  dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 20;
  dirLight.shadow.camera.bottom = -20;
  scene.add(dirLight);
  
  // 地面网格
  const gridHelper = new THREE.GridHelper(30, 30, 0x333355, 0x1a1a33);
  scene.add(gridHelper);
  
  // X轴 (光轴) - 白色虚线
  const axisGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-8, 0, 0), new THREE.Vector3(10, 0, 0)
  ]);
  const axisMat = new THREE.LineDashedMaterial({ color: 0x555577, dashSize: 0.5, gapSize: 0.3 });
  const axisLine = new THREE.Line(axisGeom, axisMat);
  axisLine.computeLineDistances();
  scene.add(axisLine);
  
  // 装置组
  scene.add(deviceGroup);
  
  // 背景星点
  const starsGeom = new THREE.BufferGeometry();
  const starsCount = 500;
  const starsPos = new Float32Array(starsCount * 3);
  for (let i = 0; i < starsCount * 3; i += 3) {
    starsPos[i] = (Math.random() - 0.5) * 30;
    starsPos[i+1] = (Math.random() - 0.5) * 20;
    starsPos[i+2] = (Math.random() - 0.5) * 20;
  }
  starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
  const starsMat = new THREE.PointsMaterial({ color: 0x4444aa, size: 0.03 });
  scene.add(new THREE.Points(starsGeom, starsMat));
  
  // 动画循环
  function animate() {
    animationId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
  
  // 响应式
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
}

// ============================================================
// 3D 装置构建
// ============================================================
function clearDevice() {
  while(deviceGroup.children.length > 0) {
    deviceGroup.remove(deviceGroup.children[0]);
  }
  rayLines = [];
}

function getWavelengthColor(wl) {
  const hsl = ((wl - 380) / (780 - 380)) * 0.75;
  return new THREE.Color().setHSL(1.0 - hsl, 0.9, 0.6);
}

function buildDevice() {
  clearDevice();
  
  const color = getWavelengthColor(params.wavelength);
  const mode = params.diffMode;
  
  // 先在屏上显示默认暗色纹理，避免灰屏
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 2;
  tempCanvas.height = 2;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.fillStyle = '#000000';
  tempCtx.fillRect(0, 0, 2, 2);
  const tempTex = new THREE.CanvasTexture(tempCanvas);
  function setTempScreen(obj) {
    if (obj.isMesh && obj.name === 'screenFace') {
      obj.material.map = tempTex;
      obj.material.color.set(0x222222);
      obj.material.needsUpdate = true;
    }
    if (obj.children) {
      for (const c of obj.children) setTempScreen(c);
    }
  }
  setTimeout(() => {
    setTempScreen(deviceGroup);
    // 加载缓存的图样
    if (window._latestPatternB64) {
      applyPatternToScreen(window._latestPatternB64);
    }
  }, 50);
  const diffType = params.diffType;
  
  // 坐标系统: 光源位置动态计算, 障碍物在 x=0, 屏在 x=7
  const obstacleX = 0;
  const screenX = 7;
  let sourceX;
  
  if (mode === 'fresnel') {
    // 菲涅耳: 光源距离可调，按比例缩放到3D场景
    const ratio = params.sourceDistance / Math.max(params.obsDistance, 1);
    sourceX = -Math.max(1.5, Math.min(12, ratio * 7));
  } else {
    sourceX = -7;  // 夫琅禾费: 固定
  }
  
  const lens1X = sourceX + 3;   // 准直透镜 (在光源与障碍物之间)
  const lens2X = 3.5;           // 会聚透镜
  
  // ===== 光源 =====
  lightSource = createLightSource(sourceX, color);
  deviceGroup.add(lightSource);
  
  // 光源标签
  addLabel(sourceX, -1.5, 0, '光源', 0xcccccc);
  
  // ===== 光路 (入射部分) =====
  if (mode === 'fresnel') {
    // 菲涅耳: 球面波发散光线 (无透镜)
    addDivergingRays(sourceX, obstacleX, 0.9, color, 20);
    // 球面波前
    addWavefrontArcs(sourceX, 0.4, color, 3);
  } else {
    // 夫琅禾费: 光源→准直透镜L1→平行光→障碍物→衍射光→会聚透镜L2→汇聚→屏
    
    // 光源到L1的发散光
    addDivergingRays(sourceX, lens1X, 0.8, color, 16);
    
    // 准直透镜 L1
    lensL1Group = createLens(lens1X, color, 'L1 (准直)');
    deviceGroup.add(lensL1Group);
    
    // L1到障碍物的平行光 (加宽)
    addParallelRays(lens1X + 0.3, obstacleX - 0.3, 1.0, color, 10);
    
    // 波前 (平行光)
    for (let x of [sourceX + 2.5, sourceX + 3.5]) {
      const wfGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, -2.5, 0), new THREE.Vector3(x, 2.5, 0)
      ]);
      const wf = new THREE.Line(wfGeom, new THREE.LineDashedMaterial({ color: color, dashSize: 0.3, gapSize: 0.2, transparent: true, opacity: 0.5 }));
      wf.computeLineDistances();
      deviceGroup.add(wf);
    }
  }
  
  // ===== 障碍物 =====
  obstacleGroup = createObstacle(obstacleX, diffType, color);
  deviceGroup.add(obstacleGroup);
  
  // 障碍物标签
  const typeNames = { single_slit: '单缝', circular: '圆孔', circular_disk: '圆屏', rectangular: '矩孔' };
  addLabel(obstacleX, -1.8, 0, typeNames[diffType], 0x7ec8e3);
  
  // ===== 衍射光 (障碍物后) =====
  if (mode === 'fresnel') {
    // 菲涅耳: 球面衍射波 (从缝隙发出) - 加宽
    addDivergingRays(obstacleX, screenX, 1.0, color, 20);
    addWavefrontArcs(obstacleX, 0.3, color, 3);
    addLabel((obstacleX + screenX) / 2, 4.5, 0, '衍射球面波', 0x666688);
  } else {
    // 夫琅禾费: 衍射光→会聚透镜L2 - 加宽
    addDivergingRays(obstacleX, lens2X, 0.8, color, 20);
    
    // 会聚透镜 L2
    lensL2Group = createLens(lens2X, color, 'L2 (会聚)');
    deviceGroup.add(lensL2Group);
    
    // L2到屏的汇聚光 - 加宽
    addConvergingRays(lens2X + 0.3, screenX - 0.3, 0.8, color, 18);
    
    // 波前
    addWavefrontArcs(obstacleX, 0.3, color, 2);
    addLabel((obstacleX + lens2X) / 2, 4.5, 0, '衍射光', 0x666688);
    addLabel((lens2X + screenX) / 2, 4.5, 0, '汇聚光', 0x666688);
  }
  
  // ===== 观察屏 =====
  screenPlane = createScreen(screenX);
  deviceGroup.add(screenPlane);
  
  const screenLabel = mode === 'fraunhofer' ? '焦平面\n(观察屏)' : '观察屏';
  addLabel(screenX, -1.8, 0, screenLabel, 0xcccccc);
  
  // 焦距标注 (仅夫琅禾费)
  if (mode === 'fraunhofer') {
    addDistanceLabel(lens2X, screenX, -1.5, 0, 'f (焦距)', 0x888888);
  }
  
  // 观察距离标注
  addDistanceLabel(obstacleX, screenX, -2.2, 0, `L=${params.obsDistance.toFixed(1)}cm`, 0x888888);
  
  // ===== 衍射图样在屏上 =====
  loadPatternOnScreen(screenX);
  
  console.log('Device built:', mode, diffType);
}

function createLightSource(x, color) {
  const group = new THREE.Group();
  
  // 发光球体
  const sphereGeom = new THREE.SphereGeometry(0.35, 32, 32);
  const sphereMat = new THREE.MeshStandardMaterial({ 
    color: color, emissive: color, emissiveIntensity: 2, roughness: 0.3 });
  const sphere = new THREE.Mesh(sphereGeom, sphereMat);
  sphere.position.set(x, 0, 0);
  sphere.castShadow = true;
  group.add(sphere);
  
  // 光晕
  const glowGeom = new THREE.SphereGeometry(0.55, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15 });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  glow.position.set(x, 0, 0);
  group.add(glow);
  
  return group;
}

function createLens(x, color, label) {
  const group = new THREE.Group();
  
  // 双凸透镜 (两个半球cap + 圆柱)
  const lensRadius = 2.8;
  const thickness = 0.3;
  
  // 左凸面
  const leftCapGeom = new THREE.SphereGeometry(lensRadius, 32, 32, 0, Math.PI * 2, 0, Math.PI / 3);
  const leftCap = new THREE.Mesh(leftCapGeom, 
    new THREE.MeshPhysicalMaterial({ 
      color: 0x88ccff, transparent: true, opacity: 0.5, 
      roughness: 0.1, metalness: 0.1, clearcoat: 0.5 
    }));
  leftCap.position.set(x - thickness/2, 0, 0);
  leftCap.rotation.y = Math.PI / 2;
  group.add(leftCap);
  
  // 右凸面
  const rightCapGeom = new THREE.SphereGeometry(lensRadius, 32, 32, 0, Math.PI * 2, Math.PI * 2/3, Math.PI / 3);
  const rightCap = new THREE.Mesh(rightCapGeom,
    new THREE.MeshPhysicalMaterial({ 
      color: 0x88ccff, transparent: true, opacity: 0.5, 
      roughness: 0.1, metalness: 0.1, clearcoat: 0.5 
    }));
  rightCap.position.set(x + thickness/2, 0, 0);
  rightCap.rotation.y = -Math.PI / 2;
  group.add(rightCap);
  
  // 高光边缘
  const ringGeom = new THREE.TorusGeometry(lensRadius * 0.7, 0.06, 16, 48);
  const ring = new THREE.Mesh(ringGeom, new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3 }));
  ring.position.set(x, 0, 0);
  ring.rotation.y = Math.PI / 2;
  group.add(ring);
  
  // 标签
  addLabel(x, 1.7, 0, label, 0x88ccff);
  
  return group;
}

function createObstacle(x, diffType, color) {
  const group = new THREE.Group();
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.5, metalness: 0.1 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.4, metalness: 0.2 });
  
  const plateWidth = 0.25;
  const plateHeight = 5;
  const plateDepth = 1.5;
  
  if (diffType === 'single_slit') {
    // 竖直狭缝：缝在 z 方向窄 (a)，在 y 方向长 (整板高度)
    const a = Math.max(params.aperture / 10, 0.3); // 缝宽 (z方向)
    const totalH = plateHeight * 2;             // y方向全高

    // 前块挡板 (z > 0)
    const fdz = Math.max((plateDepth - a) / 2, 0.05);
    const fGeom = new THREE.BoxGeometry(plateWidth, totalH, fdz);
    const fPlate = new THREE.Mesh(fGeom, darkMat);
    fPlate.position.set(x, 0,  (plateDepth + a) / 4);
    fPlate.castShadow = true;
    group.add(fPlate);

    // 后块挡板 (z < 0)
    const bGeom = new THREE.BoxGeometry(plateWidth, totalH, fdz);
    const bPlate = new THREE.Mesh(bGeom, darkMat);
    bPlate.position.set(x, 0, -(plateDepth + a) / 4);
    bPlate.castShadow = true;
    group.add(bPlate);

    // 发光缝面 (yz平面内，表示光通过的狭缝)
    const slitGeom = new THREE.PlaneGeometry(a, totalH);
    const slitMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, emissive: color, emissiveIntensity: 0.9,
      side: THREE.DoubleSide, transparent: true, opacity: 0.6
    });
    const slit = new THREE.Mesh(slitGeom, slitMat);
    slit.position.set(x, 0, 0);
    slit.rotation.y = Math.PI / 2;
    group.add(slit);
    
  } else if (diffType === 'circular') {
    const D = Math.max(params.aperture / 10, 0.5);
    // 完整板 + 圆形透明孔 (用Torus做孔边缘)
    const plateGeom = new THREE.BoxGeometry(plateWidth, plateHeight, plateDepth);
    const plate = new THREE.Mesh(plateGeom, darkMat);
    plate.position.set(x, 0, 0);
    plate.castShadow = true;
    group.add(plate);
    
    // 白色圆孔 (发光圆盘模拟)
    const holeGeom = new THREE.CylinderGeometry(D/2, D/2, plateWidth + 0.05, 32);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: color, emissiveIntensity: 0.8 });
    const hole = new THREE.Mesh(holeGeom, holeMat);
    hole.position.set(x, 0, 0);
    hole.rotation.z = Math.PI / 2;
    group.add(hole);
    
  } else if (diffType === 'circular_disk') {
    const R = Math.max(params.diskRadius / 10, 0.4);
    const diskGeom = new THREE.CylinderGeometry(R, R, plateWidth, 32);
    const disk = new THREE.Mesh(diskGeom, darkMat);
    disk.position.set(x, 0, 0);
    disk.rotation.z = Math.PI / 2;
    disk.castShadow = true;
    group.add(disk);
    
  } else if (diffType === 'rectangular') {
    const aw = Math.max(params.aperture / 10, 0.5);
    const ah = Math.max(params.apertureHeight / 10, 1.0);
    
    // 在板中央挖一个矩形孔: 用四块小挡板实现
    const thickness = plateWidth;
    const w = plateHeight / 2 - ah/2;
    if (w > 0) {
      const topGeom = new THREE.BoxGeometry(thickness, w, plateDepth);
      const top = new THREE.Mesh(topGeom, darkMat);
      top.position.set(x, ah/2 + w/2, 0);
      top.castShadow = true;
      group.add(top);
      const bot = new THREE.Mesh(topGeom, darkMat);
      bot.position.set(x, -ah/2 - w/2, 0);
      bot.castShadow = true;
      group.add(bot);
    }
    
    const h = plateDepth / 2 - aw/2;
    if (h > 0) {
      const sideGeom = new THREE.BoxGeometry(thickness, ah, h);
      const left = new THREE.Mesh(sideGeom, darkMat);
      left.position.set(x, 0, aw/2 + h/2);
      left.castShadow = true;
      group.add(left);
      const right = new THREE.Mesh(sideGeom, darkMat);
      right.position.set(x, 0, -aw/2 - h/2);
      right.castShadow = true;
      group.add(right);
    }
  }
  
  return group;
}

function createScreen(x) {
  const group = new THREE.Group();
  
  // 观察屏面板 - 用 BasicMaterial，不受光照影响，纹理原样显示
  const screenGeom = new THREE.PlaneGeometry(7, 8.5);
  const screenMat = new THREE.MeshBasicMaterial({ 
    color: 0x333333,  // 深灰底色(纹理加载前可见)
    side: THREE.DoubleSide
  });
  const screen = new THREE.Mesh(screenGeom, screenMat);
  screen.position.set(x, 0, 0);
  screen.rotation.y = Math.PI / 2;  // 旋转使平面垂直于X轴，法线指向-x
  screen.name = 'screenFace';
  group.add(screen);
  
  // 屏体边框/支架 (灰色框)
  const frameGeom = new THREE.BoxGeometry(0.15, 8.8, 7.5);
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.5 });
  const frame = new THREE.Mesh(frameGeom, frameMat);
  frame.position.set(x + 0.1, 0, 0);
  frame.castShadow = true;
  group.add(frame);
  
  return group;
}

function addDivergingRays(fromX, toX, spreadAngle, color, numRays) {
  for (let i = 0; i < numRays; i++) {
    const t = (i / (numRays - 1) - 0.5) * 2 * spreadAngle;
    const yTo = t * (toX - fromX) / (1 + Math.abs(fromX));
    const points = [
      new THREE.Vector3(fromX + 0.3, 0, 0),
      new THREE.Vector3(toX - 0.3, yTo, 0)
    ];
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.35 });
    const line = new THREE.Line(geom, mat);
    deviceGroup.add(line);
    rayLines.push(line);
  }
}

function addParallelRays(fromX, toX, height, color, numRays) {
  for (let i = 0; i < numRays; i++) {
    const y = (i / (numRays - 1) - 0.5) * 2 * height;
    const points = [
      new THREE.Vector3(fromX, y, 0),
      new THREE.Vector3(toX, y, 0)
    ];
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
    const line = new THREE.Line(geom, mat);
    deviceGroup.add(line);
    rayLines.push(line);
  }
}

function addConvergingRays(fromX, toX, height, color, numRays) {
  for (let i = 0; i < numRays; i++) {
    const yStart = (i / (numRays - 1) - 0.5) * 2 * height;
    // 汇聚到屏中心附近
    const fraction = 0.7;
    const yEnd = yStart * (1 - fraction);
    const points = [
      new THREE.Vector3(fromX, yStart, 0),
      new THREE.Vector3(toX, yEnd, 0)
    ];
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 });
    const line = new THREE.Line(geom, mat);
    deviceGroup.add(line);
    rayLines.push(line);
  }
}

function addWavefrontArcs(centerX, radius, color, numArcs) {
  for (let j = 0; j < numArcs; j++) {
    const r = radius * (j + 1);
    const points = [];
    const numPts = 40;
    for (let i = 0; i <= numPts; i++) {
      const angle = (i / numPts - 0.5) * Math.PI * 1.0;
      points.push(new THREE.Vector3(centerX + r * Math.cos(angle), r * Math.sin(angle), 0));
    }
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineDashedMaterial({ color: color, transparent: true, opacity: 0.25, dashSize: 0.15, gapSize: 0.1 });
    const arc = new THREE.Line(geom, mat);
    arc.computeLineDistances();
    deviceGroup.add(arc);
  }
}

function addLabel(x, y, z, text, color) {
  // Three.js 原生标签使用 sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(x, y, z);
  sprite.scale.set(3, 0.75, 1);
  deviceGroup.add(sprite);
}

function addDistanceLabel(x1, x2, y, z, text, color) {
  // 距离箭头
  const points = [
    new THREE.Vector3(x1, y, z),
    new THREE.Vector3(x2, y, z)
  ];
  const geom = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: color });
  const line = new THREE.Line(geom, mat);
  deviceGroup.add(line);
  
  addLabel((x1 + x2) / 2, y - 0.4, z, text, color);
}

function loadPatternOnScreen(screenX) {
  // 从缓存中获取最新的图样并贴到屏上
  // 使用全局变量缓存最新数据
  if (window._latestPatternB64) {

}

function applyPatternToScreen(b64) {
  if (!b64) return;
  const img = new Image();
  img.onload = () => {
    const texSize = 1024;
    const canvas = document.createElement('canvas');
    canvas.width = texSize;
    canvas.height = texSize;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, texSize, texSize);
    ctx.drawImage(img, 0, 0, texSize, texSize);
    
    const texture = new THREE.CanvasTexture(canvas);
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.needsUpdate = true;
    
    function findAndSetScreenFace(obj) {
      if (obj.isMesh && obj.name === 'screenFace') {
        obj.material.map = texture;
        obj.material.color.set(0xffffff);
        obj.material.needsUpdate = true;
        return true;
      }
      if (obj.children) {
        for (const c of obj.children) {
          if (findAndSetScreenFace(c)) return true;
        }
      }
      return false;
    }
    findAndSetScreenFace(deviceGroup);
  };
  img.src = 'data:image/png;base64,' + b64;
}

// ============================================================
// 性能优化：防抖 & 请求取消
// ============================================================
let abortController = null;
let debounceTimer = null;

function debounce(fn, delay) {
  return function(...args) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fn.apply(this, args), delay);
  };
}

// ============================================================
// 数据请求 & 图表更新
// ============================================================
async function fetchPattern() {
  // 取消上一次未完成的请求
  if (abortController) {
    abortController.abort();
  }
  abortController = new AbortController();
  
  const data = {
    diff_type: params.diffType,
    diff_mode: params.diffMode,
    wavelength: params.wavelength,
    aperture: params.aperture,
    aperture_height: params.apertureHeight,
    disk_radius: params.diskRadius,
    obs_distance: params.obsDistance,
    source_distance: params.sourceDistance
  };
  
  try {
    const resp = await fetch('/api/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      signal: abortController.signal
    });
    return await resp.json();
  } catch (err) {
    if (err.name === 'AbortError') {
      return null;  // 请求被取消，静默处理
    }
    throw err;
  }
}

let chartInstance = null;

function updateCharts(data) {
  // 更新强度图
  const canvas = document.getElementById('intensity-chart');
  const ctx = canvas.getContext('2d');
  
  // 设置canvas大小
  const container = document.getElementById('intensity-panel');
  canvas.width = container.clientWidth - 20;
  canvas.height = container.clientHeight - 40;
  
  // 清除
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const w = canvas.width;
  const h = canvas.height;
  const margin = { top: 20, right: 30, bottom: 40, left: 50 };
  const pw = w - margin.left - margin.right;
  const ph = h - margin.top - margin.bottom;
  
  // 背景
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, w, h);
  
  // 绘图区
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(margin.left, margin.top, pw, ph);
  
  // 光强数据 - 支持矩孔的双向显示
  const intensity = data.intensity;
  const xData = intensity.x;
  let iData;
  if (intensity.I) {
    iData = intensity.I;
  } else if (intensity.I_x && intensity.I_y) {
    // 矩孔: 显示 I_x + I_y 的合成
    iData = intensity.I_x.map((v, i) => Math.max(v, intensity.I_y[i]));
  } else {
    return;
  }
  
  if (iData.length === 0) return;
  
  const xMin = xData[0];
  const xMax = xData[xData.length - 1];
  const iMax = 1.05;
  
  function xToPx(x) { return margin.left + (x - xMin) / (xMax - xMin) * pw; }
  function iToPy(i) { return margin.top + ph - (i / iMax) * ph; }
  
  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = margin.top + (ph / 5) * i;
    ctx.beginPath();
    ctx.moveTo(margin.left, y);
    ctx.lineTo(w - margin.right, y);
    ctx.stroke();
  }
  
  // 坐标轴
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + ph);
  ctx.lineTo(w - margin.right, margin.top + ph);
  ctx.stroke();
  
  // X轴标签
  ctx.fillStyle = '#999';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  const xSteps = 5;
  for (let i = 0; i <= xSteps; i++) {
    const xv = xMin + (xMax - xMin) * i / xSteps;
    ctx.fillText(xv.toFixed(1), xToPx(xv), margin.top + ph + 20);
  }
  ctx.fillText('位置 (mm)', margin.left + pw/2, margin.top + ph + 35);
  
  // Y轴标签
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const iv = i / 4;
    ctx.fillText(iv.toFixed(2), margin.left - 8, iToPy(iv) + 4);
  }
  ctx.save();
  ctx.translate(12, margin.top + ph/2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('相对强度', 0, 0);
  ctx.restore();
  
  // 强度曲线 - 使用波长对应颜色
  const wlColor = data.color || '#ff4422';
  ctx.strokeStyle = wlColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < iData.length; i++) {
    const px = xToPx(xData[i]);
    const py = iToPy(iData[i]);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
  
  // Nf标注
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Nf = ${intensity.Nf?.toExponential(2) || 'N/A'}`, margin.left + 10, margin.top + 18);
  
  // 缓存并更新衍射图样
  window._latestPatternB64 = data.pattern_b64;
  const patternImg = document.getElementById('pattern-img');
  if (data.pattern_b64) {
    patternImg.src = 'data:image/png;base64,' + data.pattern_b64;
  }
  // 同步更新3D屏面纹理
  applyPatternToScreen(data.pattern_b64);
  
  // 更新模式指示器
  const modeName = data.intensity.mode === 'fresnel' ? '菲涅耳衍射 (近场)' : '夫琅禾费衍射 (远场)';
  document.getElementById('mode-name').textContent = modeName;
  document.getElementById('nf-value').textContent = `Nf = ${intensity.Nf?.toExponential(3) || 'N/A'}`;
  
  const suggestion = document.getElementById('suggestion');
  if (intensity.Nf < 0.1 && data.intensity.mode === 'fresnel') {
    suggestion.textContent = '⚠️ Nf << 1, 建议切换为夫琅禾费模式';
  } else if (intensity.Nf > 1 && data.intensity.mode === 'fraunhofer') {
    suggestion.textContent = '⚠️ Nf > 1, 建议切换为菲涅耳模式';
  } else {
    suggestion.textContent = data.intensity.mode === 'fraunhofer' ? '✓ 远场条件满足' : '✓ 近场衍射';
  }
}

  const patternImg = document.getElementById('pattern-img');
  if (patternImg) patternImg.src = '';
  
  if (regenDevice) {

  fetchPattern().then(data => {

    updateCharts(data);
    document.getElementById('loading').style.display = 'none';
  }).catch(err => {
    console.error(err);
    document.getElementById('loading').style.display = 'none';
  });
}

      html += `<p><b>明暗纹条件:</b> ${ff.circular_condition}</p>`;
      html += '<h4>矩孔衍射</h4>';
      html += `<div class="formula">${ff.rectangular}</div>`;
      html += `<p><b>图样特征:</b> ${ff.rectangular_pattern}</p>`;
      html += `<p><b>明暗纹条件:</b> ${ff.rectangular_condition}</p>`;
      html += '<h4>圆屏衍射</h4>';
      html += `<div class="formula">${ff.circular_disk}</div>`;
      html += `<p><b>图样特征:</b> ${ff.circular_disk_pattern}</p>`;
      html += `<p><b>泊松亮斑条件:</b> ${ff.circular_disk_condition}</p>`;
      
      // 巴比涅原理
      const b = data.babinet;
      html += `<h3>${b.title}</h3>`;
      html += `<p>${b.content}</p>`;
      
      kbBody.innerHTML = html;
      modal.classList.add('show');
    } catch (e) {
      kbBody.innerHTML = '<p>加载知识库失败</p>';
      modal.classList.add('show');
    }
  });
  
  document.getElementById('close-kb').addEventListener('click', () => {
    document.getElementById('knowledge-modal').classList.remove('show');
  });
  document.getElementById('knowledge-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.remove('show');
    }
  });
  
  // 窗口大小调整时更新chart
  window.addEventListener('resize', () => {
    if (chartInstance) {
      // Canvas chart 需要重绘
      fetchPattern().then(data => updateCharts(data));
    }
  });
}

function updateVisibility() {
  const dt = params.diffType;
  const dm = params.diffMode;
  document.getElementById('ap-group').style.display = 'block';
  document.getElementById('aph-group').style.display = (dt === 'rectangular') ? 'block' : 'none';
  document.getElementById('dr-group').style.display = (dt === 'circular_disk') ? 'block' : 'none';
  // 光源距离仅菲涅耳模式显示
  document.getElementById('sd-group').style.display = (dm === 'fresnel') ? 'block' : 'none';
  
  const labels = { single_slit: '缝宽 a (mm)', circular: '孔径 D (mm)', 
                   rectangular: '孔宽 a (mm)', circular_disk: '(不适用)' };
  document.getElementById('ap-label').textContent = labels[dt] || '缝宽 (mm)';
  
  if (dt === 'circular_disk') {
    document.getElementById('ap-group').style.display = 'none';
  }
}

// ============================================================
// 启动
// ============================================================
initScene();
setupControls();
updateVisibility();

// 初始加载
setTimeout(() => updateAll(true), 500);

// 键盘快捷键
window.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case 'r': document.getElementById('btn-reset').click(); break;
    case 'f': case 'k': document.getElementById('btn-knowledge').click(); break;
    case '1': 
      document.getElementById('diff-mode').value = 'fresnel';
      document.getElementById('diff-mode').dispatchEvent(new Event('change'));
      break;
    case '2':
      document.getElementById('diff-mode').value = 'fraunhofer';
      document.getElementById('diff-mode').dispatchEvent(new Event('change'));
      break;
  }
});

console.log('🔬 光学衍射仿真已就绪');
</script>
