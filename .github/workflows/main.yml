name: 打包 Windows 版

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'         # 推送版本标签时自动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flask numpy scipy pillow pyinstaller

      - name: 打包成 .exe
        run: |
          pyinstaller --onefile --windowed --name "光学衍射仿真" `
            --add-data "static;static" `
            --hidden-import numpy `
            --hidden-import scipy.special `
            diffraction_app.py

      - name: 上传 .exe
        uses: actions/upload-artifact@v4
        with:
          name: 光学衍射仿真-Windows版
          path: dist/光学衍射仿真.exe
