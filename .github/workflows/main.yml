name: 🪟 打包 Windows 版 (PyInstaller)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install flask numpy scipy pillow pyinstaller

      - name: 📁 准备 static 目录（前端文件实际在根目录）
        shell: pwsh
        run: |
          if (-not (Test-Path "static")) { New-Item -ItemType Directory -Path "static" | Out-Null }
          if (Test-Path "index.html")    { Copy-Item "index.html" "static\index.html" }
          if (Test-Path "three.min.js") { Copy-Item "three.min.js" "static\three.min.js" }
          Write-Output "static 目录内容:"
          Get-ChildItem "static"

      - name: 🔨 打包成 .exe
        shell: pwsh
        run: pyinstaller --onefile --windowed --name "光学衍射仿真" --add-data "static;static" --hidden-import numpy --hidden-import scipy.special --hidden-import PIL --collect-all flask --collect-all numpy --collect-all scipy --collect-all PIL diffraction_app.py

      - name: ✅ 验证打包结果
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\光学衍射仿真.exe")) {
            Write-Output "❌ 打包失败"
            exit 1
          }
          Write-Output "✓ 打包成功！大小:"
          Get-Item "dist\光学衍射仿真.exe" | Select-Object Length

      - name: 📤 上传 .exe
        uses: actions/upload-artifact@v4
        with:
          name: 光学衍射仿真-Windows版
          path: dist\光学衍射仿真.exe

      - name: 🏷️ 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 光学衍射仿真 ${{ github.ref_name }}
          body: |
            ## 🎉 光学衍射仿真 ${{ github.ref_name }}

            ### 使用方式
            1. 下载下方 `光学衍射仿真.exe`
            2. 双击运行（无需安装 Python）
            3. 程序会自动打开浏览器 → http://127.0.0.1:8080

            ### 功能说明
            - 单缝、圆孔、圆屏、矩孔衍射
            - 菲涅耳衍射 / 夫琅禾费衍射 / 3D 交互界面
          files: dist\光学衍射仿真.exe
